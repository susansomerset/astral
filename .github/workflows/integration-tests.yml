name: Integration tests

on:
  push:
    branches:
      - dev
      - 'ftr/**'
  pull_request:
    branches:
      - dev

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run integration harness
        run: ./scripts/testing/run_integration_tests.sh
